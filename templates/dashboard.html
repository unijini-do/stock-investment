<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>[보고서 제목]</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <style>
    @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css");
    :root {
      --bg: #fbfbfa;
      --card: #fff;
      --border: #eae9e4;
      --header: #f4f2ea;
      --text: #242424;
      --muted: #6f6f6b;
      --green-bg: #dcefe0;
      --green: #1c7a3e;
      --blue-bg: #dee8fb;
      --blue: #2b5ba8;
      --red-bg: #fbe1e1;
      --red: #c53a2f;
      --yellow-bg: #fbf0d6;
      --yellow: #9a6b12;
      --gray-bg: #edeef0;
      --gray: #5a5a5a;
      --radius: 16px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      color: var(--text);
      background: var(--bg);
      font-family: Pretendard, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.55;
    }
    main { width: min(100% - 28px, 1080px); margin: 24px auto 48px; }
    .stack { display: grid; gap: 14px; }
    .card {
      padding: 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }
    .header { background: var(--header); padding: 24px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; }
    .metric { padding: 14px; background: rgba(255,255,255,.7); border-radius: 12px; }
    .label { color: var(--muted); font-size: .82rem; }
    .value { margin-top: 4px; font-size: 1.35rem; font-weight: 750; }
    .num { font-variant-numeric: tabular-nums; }
    .pill { display: inline-flex; padding: 5px 10px; border-radius: 999px; font-size: .82rem; font-weight: 700; }
    .good { color: var(--green); background: var(--green-bg); }
    .info { color: var(--blue); background: var(--blue-bg); }
    .risk { color: var(--red); background: var(--red-bg); }
    .warn { color: var(--yellow); background: var(--yellow-bg); }
    .neutral { color: var(--gray); background: var(--gray-bg); }
    .levels { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .level { padding: 13px; border-radius: 12px; }
    .lvl-entry { color: var(--blue); background: var(--blue-bg); }
    .lvl-tp { color: var(--green); background: var(--green-bg); }
    .lvl-sl { color: var(--red); background: var(--red-bg); }
    h1, h2, h3, p { margin-top: 0; }
    h1 { margin-bottom: 10px; font-size: clamp(1.55rem, 4vw, 2.2rem); }
    h2 { margin-bottom: 12px; font-size: 1.12rem; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 10px 8px; border-bottom: 1px solid var(--border); text-align: left; }
    .sources { color: var(--muted); font-size: .85rem; }
    @media (max-width: 640px) {
      main { width: min(100% - 20px, 600px); margin-top: 10px; }
      .card, .header { padding: 16px; }
      .levels { grid-template-columns: 1fr; }
      .table-wrap { overflow-x: auto; }
    }
  </style>
</head>
<body>
  <main class="stack">
    <header class="card header">
      <span class="pill neutral">[분석 유형]</span>
      <h1>[보고서 제목]</h1>
      <p>[한 줄 핵심 판단]</p>
      <div class="grid">
        <div class="metric"><div class="label">기준일</div><div class="value num">YYYY-MM-DD</div></div>
        <div class="metric"><div class="label">핵심 신호</div><div class="value">[신호]</div></div>
        <div class="metric"><div class="label">확신도</div><div class="value">[상/중/하]</div></div>
      </div>
    </header>

    <section class="card">
      <h2>핵심 분석</h2>
      <p>[핵심 데이터와 해석]</p>
    </section>

    <section class="card">
      <h2>시나리오</h2>
      <div class="grid">
        <div><span class="pill good">강세</span><p>[강세 근거]</p></div>
        <div><span class="pill info">기본</span><p>[기본 시나리오]</p></div>
        <div><span class="pill risk">약세</span><p>[반대 시나리오]</p></div>
      </div>
    </section>

    <section class="card">
      <h2>가격 레벨</h2>
      <div class="levels num">
        <div class="level lvl-entry"><strong>진입</strong><br>[값 또는 범위]</div>
        <div class="level lvl-tp"><strong>목표·익절</strong><br>[값 또는 범위]</div>
        <div class="level lvl-sl"><strong>손절·무효화</strong><br>[값 또는 범위]</div>
      </div>
    </section>

    <section class="card sources">
      <h2>출처와 면책</h2>
      <p>[출처 목록]</p>
      <p>교육·리서치 목적이며 투자 권유가 아닙니다. 최종 판단과 책임은 사용자에게 있습니다.</p>
    </section>
  </main>
</body>
</html>
